# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render dashboard → New → Blueprint → select this repo.
# Render reads this file and provisions the web service automatically.

services:
  - type: web
    name: unity-performance
    runtime: node
    plan: starter # persistent disk requires a paid plan; the disk below keeps
                  # bookings/orders/content across restarts and redeploys
    # --include=dev is required: NODE_ENV=production below makes plain
    # `npm install` skip devDependencies, which is where typescript/tailwindcss
    # live — the build needs them even though the app doesn't at runtime.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false # set this in the Render dashboard during blueprint setup
      - key: ADMIN_KEY
        generateValue: true # Render generates a long random secret for you
      - key: DATA_DIR
        value: /var/data
    disk:
      name: unity-performance-data
      mountPath: /var/data
      sizeGB: 1
