# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render dashboard → New → Blueprint → select this repo.
# Render reads this file and provisions the web service + disk automatically.

services:
  - type: web
    name: unity-tuner
    runtime: node
    plan: starter # required for the persistent disk below; use "free" and delete
                  # the `disk:` block if you're OK with data resetting on redeploy
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false # set this in the Render dashboard during blueprint setup
      - key: ADMIN_KEY
        generateValue: true # Render generates a long random secret for you
      - key: DATA_DIR
        value: /var/data
    disk:
      name: unity-tuner-data
      mountPath: /var/data
      sizeGB: 1
